baseURL = 'https://Boryan147.github.io/'
languageCode = 'en-us'
title = 'Ryan's Log'
theme = 'PaperMod'

[params]
    env = 'production'
    title = 'Boryan147'
    description = "M.Sc. Student in Autonomous Technology @ FAU Erlangen-Nürnberg"
    author = "Ryan Li"
    
    # Homepage Configuration 
    [params.homeInfoParams]
        Title = "Hi, I'm Ryan! 👋"
        Content = """
        Welcome to my personal site. I am currently a Master's student at **FAU Erlangen-Nürnberg**, Germany, 
        majoring in **Autonomous Technology**. My research interests lie in **Reinforcement Learning (RL)** and Safe Control. Here, I document my learning progress, project insights, and thoughts.
        """

    # Social Media Icons
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/Boryan147"
    [[params.socialIcons]]
        name = "linkedin"
        url = "https://www.linkedin.com/in/YOUR_ID" # Replace with your real ID
    [[params.socialIcons]]
        name = "email"
        url = "bo.bo.li@fau.de"

    # Main Navigation Menu
    [[menu.main]]
        identifier = "posts"
        name = "Posts"
        url = "/posts/"
        weight = 10
    [[menu.main]]
        identifier = "projects"
        name = "Projects"
        url = "/projects/"
        weight = 20
    [[menu.main]]
        identifier = "about"
        name = "About"
        url = "/about/"
        weight = 30

    # Math and Code Features
    [params.math]
        enable = true
    
    [params.assets]
        disableHLJS = false # Keep syntax highlighting enabled